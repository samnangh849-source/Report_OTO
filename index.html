<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sale Report Dashboard</title>
    <!-- បញ្ចូល Library របស់ Telegram Web App ឲ្យវាស្គាល់ជាមួយ Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            /* ឲ្យវាប្តូរពណ៌ Background ស្វ័យប្រវត្តិទៅតាម Dark Mode/Light Mode ក្នុងតេឡេក្រាម */
            background-color: var(--tg-theme-bg-color, #f3f4f6); 
            color: var(--tg-theme-text-color, #111827); 
        }
        .tg-button { 
            background-color: var(--tg-theme-button-color, #3b82f6); 
            color: var(--tg-theme-button-text-color, #ffffff); 
        }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">
    
    <div class="max-w-md w-full mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6 mt-4 border border-gray-100 flex-grow">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">📊 OTO Sale Report</h1>
            <p class="text-sm text-gray-500 mt-2">សូមជ្រើសរើសថ្ងៃខែ ដើម្បីទាញយករបាយការណ៍</p>
        </div>

        <!-- ផ្ទាំងជ្រើសរើសកាលបរិច្ឆេទ (Date Picker) -->
        <div class="mb-8">
            <label class="block text-sm font-medium text-gray-700 mb-2">កាលបរិច្ឆេទ (Date)</label>
            <input type="date" id="datePicker" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700 bg-gray-50 font-sans" />
        </div>

        <!-- ប៊ូតុងបញ្ជាទាំង ២ -->
        <div class="space-y-3">
            <button onclick="requestReport('text')" class="w-full flex items-center justify-center gap-2 bg-blue-50 text-blue-600 border border-blue-200 py-3.5 rounded-lg font-semibold hover:bg-blue-100 transition shadow-sm">
                <span class="text-xl">📄</span> ផ្ញើជារបាយការណ៍អត្ថបទ
            </button>
            
            <button onclick="requestReport('pdf')" class="w-full flex items-center justify-center gap-2 tg-button py-3.5 rounded-lg font-semibold shadow-sm hover:opacity-90 transition">
                <span class="text-xl">📥</span> ទាញយកជា PDF (Dashboard)
            </button>
        </div>
        
        <!-- សញ្ញា Loading (លាក់ទុកសិន) -->
        <div id="loading" class="hidden mt-6 text-center text-sm text-gray-500 bg-gray-50 p-3 rounded-lg border border-gray-100">
            <span class="animate-pulse flex items-center justify-center gap-2">
                <svg class="animate-spin h-4 w-4 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                កំពុងបញ្ជូនសំណើ... សូមរង់ចាំក្នុង Group
            </span>
        </div>
    </div>

    <script>
        // បើកដំណើរការ Telegram WebApp API
        const tg = window.Telegram.WebApp;
        tg.expand(); // ពង្រីកអេក្រង់ Mini App ឲ្យធំពេញ

        // កំណត់ថ្ងៃ Default ទៅជាថ្ងៃនេះជានិច្ច
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('datePicker').value = today;

        // ចាប់យក Chat ID ពី URL របស់ Render 
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chat_id');

        // Function សម្រាប់បញ្ជូនសំណើទៅកាន់ Python Backend
        function requestReport(type) {
            const selectedDate = document.getElementById('datePicker').value;
            if (!selectedDate) {
                tg.showAlert("សូមជ្រើសរើសកាលបរិច្ឆេទសិន!");
                return;
            }

            document.getElementById('loading').classList.remove('hidden');

            // ផ្ញើទិន្នន័យ (API Call) ទៅកាន់ Render ឲ្យវាទាញ Report
            fetch('/api/trigger', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    date: selectedDate,
                    type: type,
                    chat_id: chatId
                })
            })
            .then(response => response.json())
            .then(data => {
                // បិទ Mini App នេះវិញដោយស្វ័យប្រវត្តិ ត្រឡប់ទៅ Group ដើម្បីរង់ចាំទទួល Report
                setTimeout(() => tg.close(), 500); 
            })
            .catch(error => {
                tg.showAlert("មានបញ្ហាក្នុងការភ្ជាប់ទៅកាន់ Server សូមសាកល្បងម្ដងទៀត។");
                document.getElementById('loading').classList.add('hidden');
            });
        }
    </script>
</body>
</html>
