<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sale Report Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            background-color: var(--tg-theme-bg-color, #f3f4f6); 
            color: var(--tg-theme-text-color, #111827); 
        }
        .tg-button { 
            background-color: var(--tg-theme-button-color, #3b82f6); 
            color: var(--tg-theme-button-text-color, #ffffff); 
        }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">
    
    <div class="max-w-md w-full mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6 mt-4 border border-gray-100 flex-grow">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">📊 OTO Sale Report</h1>
            <p class="text-sm text-gray-500 mt-2">សូមជ្រើសរើសថ្ងៃខែ ដើម្បីទាញយករបាយការណ៍</p>
        </div>

        <div class="mb-8">
            <label class="block text-sm font-medium text-gray-700 mb-2">កាលបរិច្ឆេទ (Date)</label>
            <input type="date" id="datePicker" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700 bg-gray-50 font-sans" />
        </div>

        <div class="space-y-3">
            <!-- សម្រួលទុកតែប៊ូតុងចេញ PDF មួយគត់ -->
            <button onclick="requestReport('pdf')" class="w-full flex items-center justify-center gap-2 tg-button py-4 rounded-xl font-bold shadow-lg hover:opacity-90 transition transform active:scale-95">
                <span class="text-xl">📊</span> ចេញរបាយការណ៍ (PDF Dashboard)
            </button>
        </div>
        
        <div id="loading" class="hidden mt-6 text-center text-sm text-gray-500 bg-gray-50 p-3 rounded-lg border border-gray-100">
            <span class="animate-pulse flex items-center justify-center gap-2 text-blue-600 font-semibold">
                ⏳ កំពុងបញ្ជូនសំណើ... សូមពិនិត្យក្នុង Group
            </span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('datePicker').value = today;

        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chat_id');

        function requestReport(type) {
            const selectedDate = document.getElementById('datePicker').value;
            if (!selectedDate) {
                tg.showAlert("សូមជ្រើសរើសកាលបរិច្ឆេទសិន!");
                return;
            }
            if (!chatId) {
                tg.showAlert("រកមិនឃើញ Chat ID ទេ។ សូមបើកកម្មវិធីនេះតាមរយៈប៊ូតុងក្នុង Telegram Group របស់អ្នក។");
                return;
            }

            document.getElementById('loading').classList.remove('hidden');

            fetch('/api/trigger', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    date: selectedDate,
                    type: type,
                    chat_id: chatId
                })
            })
            .then(response => response.json())
            .then(data => {
                // បិទ Web App ស្វ័យប្រវត្តិក្រោយពេលបញ្ជាចប់
                setTimeout(() => tg.close(), 1000); 
            })
            .catch(error => {
                tg.showAlert("មានបញ្ហាក្នុងការភ្ជាប់ទៅកាន់ Server សូមសាកល្បងម្ដងទៀត។");
                document.getElementById('loading').classList.add('hidden');
            });
        }
    </script>
</body>
</html>
